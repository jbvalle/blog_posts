## Why bother?

Most embedded developers reach for a HAL, a generated startup file, or a board support package on day one. This project does none of that. The goal: build a working STM32 firmware from the absolute bottom — custom linker script, hand-written startup code, and a \`main()\` that runs because *we* set it up, not because a code generator did.

Understanding what happens between reset and \`main()\` is not academic. When your firmware crashes without a stack trace, when your \`.bss\` isn't zeroed, when your interrupt vector is in the wrong place — this knowledge is what separates a debug session that takes 10 minutes from one that takes 3 days.

## The memory map

The STM32F4 has a fixed memory layout. We need to place code, read-only data, and initialised variables in the correct sections.

| Section | Location | Description |
|---------|----------|-------------|
| \`.text\` | Flash | Code and constants |
| \`.rodata\` | Flash | Read-only data |
| \`.data\` | RAM (loaded from Flash) | Initialised global variables |
| \`.bss\` | RAM | Zero-initialised variables |
| Stack | RAM (top) | Call stack, grows downward |

## The linker script

\`\`\`ld
MEMORY
{
  FLASH (rx)  : ORIGIN = 0x08000000, LENGTH = 512K
  RAM   (rwx) : ORIGIN = 0x20000000, LENGTH = 128K
}

SECTIONS
{
  .text :
  {
    KEEP(*(.isr_vector))
    *(.text*)
    *(.rodata*)
  } > FLASH

  _sidata = LOADADDR(.data);

  .data :
  {
    _sdata = .;
    *(.data*)
    _edata = .;
  } > RAM AT > FLASH

  .bss :
  {
    _sbss = .;
    *(.bss*)
    *(COMMON)
    _ebss = .;
  } > RAM

  _estack = ORIGIN(RAM) + LENGTH(RAM);
}
\`\`\`

The key detail: \`.data\` lives in Flash as a load address but runs from RAM. The startup code copies it. \`.bss\` doesn't need copying — it just needs zeroing. Both handled in \`startup.c\`.

## The startup file

\`\`\`c
extern uint32_t _sdata, _edata, _sidata;
extern uint32_t _sbss,  _ebss;
extern uint32_t _estack;

void Reset_Handler(void) {
    /* Copy .data from Flash to RAM */
    uint32_t *src = &_sidata;
    uint32_t *dst = &_sdata;
    while (dst < &_edata) {
        *dst++ = *src++;
    }

    /* Zero .bss */
    dst = &_sbss;
    while (dst < &_ebss) {
        *dst++ = 0;
    }

    /* Jump to application */
    main();
}
\`\`\`

No \`SystemInit()\`. No HAL. Just memory initialisation and a call to \`main()\`.

## The interrupt vector table

The Cortex-M4 expects a vector table at the start of Flash. The first two entries are non-negotiable: the initial stack pointer and the reset handler address.

\`\`\`c
__attribute__((section(".isr_vector")))
const uint32_t isr_vector[] = {
    (uint32_t)&_estack,           /* Initial stack pointer */
    (uint32_t)Reset_Handler,      /* Reset handler         */
    (uint32_t)NMI_Handler,
    (uint32_t)HardFault_Handler,
    /* ... remaining handlers ... */
};
\`\`\`

Placing this in \`.isr_vector\` and using \`KEEP()\` in the linker script ensures it is never stripped by the linker, even when no code references it directly.

## Results

- Final binary size: **2.4 KB** for a GPIO toggle with full vector table
- Zero vendor library dependency
- Fully auditable memory layout via \`arm-none-eabi-objdump -h\`
- Every byte of the binary accounted for

## Takeaways

> If you can write a startup file and a linker script from scratch, you understand your hardware. Everything else is just software on top.

The repository includes the full source, a minimal Makefile, and an OpenOCD flash script. No IDE required — \`make\` and \`make flash\` is all you need.
